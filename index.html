<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Печенька с предсказанием</title>
  <style>
    :root {
      --bg-color: #2b2d42;
      --purple: #6c5ce7;
      --gold: #fdcb6e;
      --cookie-bg: #ffeaa7;
      --text-white: #ffffff;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-white);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden; /* Чтобы не было скролла */
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Верхняя панель (экономика) */
    header {
      padding: 15px 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      z-index: 10;
    }

    .resource-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .coin-icon {
      width: 24px;
      height: 24px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #000;
    }

    .resource-text h2 {
      margin: 0;
      font-size: 20px;
      color: var(--gold);
    }
    .resource-text span {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }

    .btn-plus {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .btn-plus:active { transform: scale(0.9); }

    /* Игровое поле */
    .game-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    /* Сетка для печенек (фон) */
    .grid-area {
      width: 100%;
      max-width: 320px;
      aspect-ratio: 1;
      background: #d1ccc0;
      border-radius: 15px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 5px;
      padding: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      position: relative;
      z-index: 5;
    }

    .grid-cell {
      background: var(--cookie-bg);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: #ff7675;
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* Плашка предсказания */
    .fortune-box {
      position: absolute;
      bottom: 120px; /* Отступ от кнопки */
      background: white;
      color: #2d3436;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      max-width: 80%;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s ease;
      z-index: 6;
      border-left: 5px solid var(--purple);
    }
    .fortune-box.show {
      opacity: 1;
      transform: translateY(0);
    }
    .fortune-box h3 { margin: 0 0 10px 0; color: var(--purple); }

    /* Кнопка открытия */
    .open-btn {
      position: absolute;
      bottom: 20px;
      width: 100px;
      height: 100px;
      background: var(--purple);
      border-radius: 50%;
      border: none;
      color: white;
      font-size: 32px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(108, 92, 231, 0.4);
      transition: transform 0.1s;
      z-index: 7;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .open-btn:active { transform: scale(0.95); }

    @keyframes popIn {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    /* Нижний статус */
    .status-bar {
      padding: 10px;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <header>
    <div class="resource-group">
      <div class="coin-icon">💰</div>
      <div class="resource-text">
        <h2 id="coins">0</h2>
        <span id="cps">0.0/с</span>
      </div>
    </div>
    <button class="btn-plus">+</button>
  </header>

  <div class="game-container">
    <!-- Сюда JS будет добавлять печеньки -->
    <div class="grid-area" id="grid"></div>

    <div class="fortune-box" id="fortune">
      <h3>Твое предсказание</h3>
      <p id="fortune-text">Жди...</p>
    </div>

    <button class="open-btn" id="openBtn">🍪</button>
  </div>

  <div class="status-bar">
    Мини-игра ВКонтакте | Прогресс сохраняется
  </div>

  <script>
    // --- ДАННЫЕ ИГРЫ ---
    const state = {
      coins: 0,
      cps: 15.3, // Coins Per Second
      openedCount: 0,
      predictions: [
        "Сегодня удача будет на твоей стороне!",
        "Не бойся начинать что-то новое.",
        "Кто-то думает о тебе прямо сейчас.",
        "Тебя ждет приятный сюрприз.",
        "Доверься своей интуиции.",
        "Трудности делают тебя сильнее.",
        "Сегодня идеальный день для отдыха.",
        "Твои усилия скоро окупятся."
      ]
    };

    // --- ЗАГРУЗКА СОХРАНЕНИЯ ---
    function loadGame() {
      const saved = localStorage.getItem('cookie_game_state');
      if (saved) {
        const parsed = JSON.parse(saved);
        state.coins = parsed.coins;
        state.openedCount = parsed.openedCount;
        // CPS можно не сохранять, если он фиксированный, но можно и сохранить
      }
      updateUI();
      startAutoIncome();
    }

    // --- СОХРАНЕНИЕ ---
    function saveGame() {
      localStorage.setItem('cookie_game_state', JSON.stringify(state));
    }

    // --- ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ---
    function updateUI() {
      document.getElementById('coins').innerText = formatNumber(state.coins);
      document.getElementById('cps').innerText = state.cps.toFixed(1) + '/с';
      
      // Рисуем "печеньки" на поле (просто заглушки, чтобы было красиво)
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      for(let i=0; i<9; i++) {
        const cell = document.createElement('div');
        cell.className = 'grid-cell';
        cell.innerText = '🍪';
        grid.appendChild(cell);
      }
    }

    // Форматирование больших чисел (1000 -> 1K)
    function formatNumber(num) {
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
      return Math.floor(num);
    }

    // --- АВТО-ДОХОД ---
    function startAutoIncome() {
      setInterval(() => {
        state.coins += state.cps;
        document.getElementById('coins').innerText = formatNumber(state.coins);
        saveGame(); // Сохраняем часто, чтобы не потерять копейки
      }, 1000);
    }

    // --- МЕХАНИКА ОТКРЫТИЯ ---
    const btn = document.getElementById('openBtn');
    const fortuneBox = document.getElementById('fortune');
    const fortuneText = document.getElementById('fortune-text');

    btn.addEventListener('click', () => {
      // 1. Анимация появления предсказания
      fortuneBox.classList.remove('show');
      void fortuneBox.offsetWidth; // Триггер перерисовки
      
      // 2. Выбор случайного предсказания
      const randomPred = state.predictions[Math.floor(Math.random() * state.predictions.length)];
      fortuneText.innerText = randomPred;
      
      // 3. Добавляем немного монет за открытие
      const reward = 100 + Math.floor(Math.random() * 50);
      state.coins += reward;
      state.openedCount++;
      
      // 4. Обновляем UI и сохраняем
      updateUI();
      saveGame();

      // 5. Показываем плашку
      setTimeout(() => {
        fortuneBox.classList.add('show');
      }, 100);
    });

    // Запуск при старте
    loadGame();
  </script>

  <!-- VK Bridge (если будешь публиковать в ВК) -->
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <script>
    vkBridge.send('VKWebAppInit');
  </script>
</body>
</html>
